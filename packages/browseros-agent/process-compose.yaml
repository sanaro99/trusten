version: "0.5"

processes:
  install:
    command: bun install
    availability:
      restart: no

  server:
    command: bun --cwd apps/server start
    availability:
      restart: always
    depends_on:
      install:
        condition: process_completed_successfully

  agent-codegen:
    command: bun --cwd apps/agent codegen --watch
    availability:
      restart: always
    depends_on:
      install:
        condition: process_completed_successfully

commit-msg:
  commands:
    conventional:
      run: |
        msg=$(head -1 {1})
        if [[ ! $msg =~ ^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\(.+\))?\!?:\ .+ ]]; then
          printf 'Commit message must follow Conventional Commits format:\n'
          printf '  <type>(<optional scope>): <description>\n'
          printf '  Types: feat, fix, docs, style, refactor, perf, test, chore, ci, build, revert\n'
          printf '\n'
          printf 'Examples:\n'
          printf '  feat(auth): add OAuth2 support\n'
          printf '  fix: resolve null pointer exception\n'
          exit 1
        fi

pre-commit:
  commands:
    biome-check:
      root: "."
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}"
      run: npx @biomejs/biome check --write --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {staged_files}
      stage_fixed: true

    file-length:
      root: "."
      glob: "*.{ts,tsx}"
      exclude: "*.{test,spec,d}.ts|*.{test,spec}.tsx|**/__tests__/**|**/tests/**|**/*.generated.*"
      run: |
        for file in {staged_files}; do
          if [[ -f $file ]]; then
            lines=$(wc -l < $file | tr -d ' ')
            if [[ $lines -gt 400 ]]; then
              printf 'Warning: %s has %s lines (threshold: 400)\n' $file $lines
              printf 'Consider splitting this file if it has multiple responsibilities.\n'
            fi
          fi
        done

pre-push:
  commands:
    branch-name:
      run: |
        branch=$(git rev-parse --abbrev-ref HEAD)
        if [[ $branch == main || $branch == master ]]; then
          exit 0
        fi
        if [[ ! $branch =~ ^(feat|fix|bugfix|hotfix|release|docs|refactor|test|chore|experiment)/[a-z0-9-]+$ ]]; then
          printf 'Warning: Branch name %s does not match recommended format.\n' $branch
          printf '  Use: <type>/<short-description>\n'
          printf '  Types: feat, fix, bugfix, hotfix, release, docs, refactor, test, chore, experiment\n'
          printf '  Example: feat/add-auth, fix/login-crash\n'
          printf '\n'
          printf '  To rename your branch:\n'
          printf '    git branch -m <new-name>\n'
          printf '    git push -u origin <new-name>\n'
        fi
